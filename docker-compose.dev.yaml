services:
  db:
    image: postgres:15
    env_file:
      - .env.dev
    ports:
      - "${DB_PORT}:5432"
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - test_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${DB_USER}"]
      interval: 1m30s
      timeout: 30s
      retries: 5
      start_period: 30s
    restart: always
    networks:
      - book-digests-test-network
      

  web:
    build:
      context: .
      dockerfile: Dockerfile.dev    
    env_file:
      - .env.dev
    environment:
      ENV: dev
    ports:
      - "4001:4001"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - book-digests-test-network
    command: uvicorn src.main:app --host 0.0.0.0 --port 4001 --log-level info


  tests:
    build:
      context: .
      dockerfile: Dockerfile.dev
    env_file:
      - .env.dev
    depends_on:
      db:
        condition: service_healthy
    networks:
      - book-digests-test-network
    command: >
      sh -c "alembic upgrade head && pytest"
    
    


volumes:
  test_data:

networks:
  book-digests-test-network: