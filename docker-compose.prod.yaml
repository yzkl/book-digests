services:
  db:
    image: postgres:15
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 1m30s
      timeout: 30s
      retries: 5
      start_period: 30s
    restart: always
    networks:
      - book-digests-network
      

  web:
    build: .
    environment:
      ENV: prod
    ports:
      - "4001:8080"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - book-digests-network
    command: >
      sh -c "alembic upgrade head && uvicorn src.main:app --host 0.0.0.0 --port 8080 --log-level info"
    

volumes:
  data:

networks:
  book-digests-network: